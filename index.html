<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>文字入力歩行課題</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #111827;
      -webkit-text-size-adjust: 100%;
    }
    body {
      padding: 12px;
      padding-top: calc(env(safe-area-inset-top, 0px) + 44px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      overflow-x: hidden;
    }
    .top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 14px 8px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      color: #4b5563;
      background: rgba(255,255,255,0.96);
      z-index: 10;
      border-bottom: 1px solid #e5e7eb;
    }
    .screen {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .start-card {
      min-height: 68svh;
      border: 2px solid #d1d5db;
      border-radius: 24px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      text-align: center;
    }
    .start-title {
      font-size: clamp(30px, 8vw, 62px);
      font-weight: 900;
      line-height: 1.25;
    }
    .start-sub {
      font-size: clamp(18px, 4.5vw, 28px);
      color: #4b5563;
      line-height: 1.5;
    }
    .question {
      min-height: 30svh;
      border: 2px solid #d1d5db;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      font-size: clamp(28px, 8vw, 64px);
      font-weight: 800;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .answer-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    button {
      font: inherit;
      border: 0;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 20px;
      font-weight: 800;
      color: white;
      background: #2563eb;
      width: 100%;
    }
    button.start {
      font-size: clamp(24px, 7vw, 42px);
      padding: 22px 16px;
      border-radius: 18px;
    }
    button.secondary { background: #374151; }
    input {
      width: 100%;
      border: 2px solid #9ca3af;
      border-radius: 18px;
      padding: 16px;
      font-size: clamp(24px, 7vw, 44px);
      text-align: center;
      background: #fff;
    }
    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }
    .countdown {
      min-height: 70svh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(72px, 24vw, 180px);
      font-weight: 900;
      text-align: center;
    }
    .message {
      min-height: 65svh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(32px, 10vw, 72px);
      font-weight: 900;
      text-align: center;
      line-height: 1.3;
    }
    .sub {
      text-align: center;
      color: #6b7280;
      font-size: 16px;
    }

    body.keyboard-open .question {
      min-height: 24svh;
      font-size: clamp(24px, 7vw, 54px);
      padding: 16px;
    }
    body.keyboard-open button {
      padding: 13px 14px;
      font-size: 19px;
    }
    body.keyboard-open input {
      padding: 13px;
      font-size: clamp(22px, 6vw, 38px);
    }
    body.keyboard-open .button-row {
      display: none;
    }
  </style>
</head>
<body>
  <div class="top">
    <span id="title">文字入力歩行課題</span>
    <span id="time">待機中</span>
  </div>

  <main class="screen">
    <section id="startScreen" class="start-card">
      <div class="start-title">文字入力歩行課題</div>
      <div class="start-sub">
        スタートを押すと5秒後に開始します。<br>
        歩きながら、表示された問いに短く答えてください。
      </div>
      <button id="startBtn" class="start">スタート</button>
    </section>

    <div id="countdown" class="countdown" style="display:none;">5</div>

    <section id="task" style="display:none;">
      <div id="question" class="question"></div>

      <div class="answer-panel">
        <button id="next">回答して次へ</button>
        <input id="answer" autocomplete="off" autocorrect="off" autocapitalize="off" inputmode="text" placeholder="短く入力">
      </div>
    </section>

    <div id="end" style="display:none;">
      <div class="message">終了</div>
    </div>

    <div class="button-row" id="bottomButtons" style="display:none;">
      <button id="restart">もう一度実施</button>
    </div>
  </main>

  <script>
    const QUESTIONS = [
      "今日の朝食は？",
      "昨日の夕食は？",
      "好きなスポーツは？",
      "通学手段は？",
      "好きな色は？",
      "好きな季節は？",
      "好きな食べ物は？",
      "苦手な食べ物は？",
      "好きな飲み物は？",
      "好きな果物は？",
      "好きな動物は？",
      "好きな曜日は？",
      "好きな天気は？",
      "好きな教科は？",
      "好きな音楽は？",
      "好きな映画は？",
      "好きな本は？",
      "好きな場所は？",
      "行ってみたい国は？",
      "行ってみたい都道府県は？",
      "休日にしたいことは？",
      "今日の体調を一言で",
      "最近楽しかったことは？",
      "大学生活で楽しみなことは？",
      "今日の授業の感想を一言で",
      "運動は好きですか？",
      "歩くのは好きですか？",
      "普段よく使う交通手段は？",
      "スマホをよく使う場面は？",
      "よく使うアプリは？",
      "朝型ですか夜型ですか？",
      "犬派ですか猫派ですか？",
      "海派ですか山派ですか？",
      "夏派ですか冬派ですか？",
      "和食派ですか洋食派ですか？",
      "ご飯派ですかパン派ですか？",
      "好きな数字は？",
      "今日の日付は？",
      "今は何月ですか？",
      "1 + 2 は？",
      "3 + 4 は？",
      "5 + 6 は？",
      "10 - 3 は？",
      "12 - 5 は？",
      "2 × 3 は？",
      "4 × 2 は？",
      "8 ÷ 2 は？",
      "赤いものを一つ",
      "青いものを一つ",
      "丸いものを一つ",
      "四角いものを一つ",
      "学校にあるものを一つ",
      "体育館にあるものを一つ",
      "今見えるものを一つ",
      "今日持ってきたものを一つ",
      "朝にすることを一つ",
      "夜にすることを一つ",
      "運動の名前を一つ",
      "スポーツ名を一つ",
      "体の部位を一つ",
      "健康に関係する言葉を一つ"
    ];

    const COUNTDOWN_SEC = 5;
    const TASK_DURATION_SEC = 120;

    let countdownTimer = null;
    let taskTimer = null;
    let startTime = 0;
    let shuffledQuestions = [];
    let index = 0;

    const startScreenEl = document.getElementById("startScreen");
    const countdownEl = document.getElementById("countdown");
    const taskEl = document.getElementById("task");
    const questionEl = document.getElementById("question");
    const answerEl = document.getElementById("answer");
    const endEl = document.getElementById("end");
    const timeEl = document.getElementById("time");
    const bottomButtonsEl = document.getElementById("bottomButtons");

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function prepareQuestions() {
      shuffledQuestions = shuffleArray(QUESTIONS);
      index = 0;
    }

    function showStartScreen() {
      clearAllTimers();
      document.body.classList.remove("keyboard-open");
      startScreenEl.style.display = "flex";
      countdownEl.style.display = "none";
      taskEl.style.display = "none";
      endEl.style.display = "none";
      bottomButtonsEl.style.display = "none";
      timeEl.textContent = "待機中";
    }

    function showCountdown() {
      clearAllTimers();
      prepareQuestions();
      startScreenEl.style.display = "none";
      taskEl.style.display = "none";
      endEl.style.display = "none";
      bottomButtonsEl.style.display = "none";
      countdownEl.style.display = "flex";
      timeEl.textContent = "準備";

      let remaining = COUNTDOWN_SEC;
      countdownEl.textContent = remaining;

      countdownTimer = setInterval(() => {
        remaining -= 1;
        if (remaining <= 0) {
          clearInterval(countdownTimer);
          countdownEl.textContent = "開始";
          setTimeout(startTask, 500);
        } else {
          countdownEl.textContent = remaining;
        }
      }, 1000);
    }

    function startTask() {
      startTime = performance.now();
      countdownEl.style.display = "none";
      endEl.style.display = "none";
      taskEl.style.display = "block";
      showQuestion();

      taskTimer = setInterval(updateTime, 100);
      updateTime();

      setTimeout(() => {
        answerEl.focus();
        scrollInputIntoView();
      }, 300);
    }

    function showQuestion() {
      if (index >= shuffledQuestions.length) {
        shuffledQuestions = shuffleArray(QUESTIONS);
        index = 0;
      }
      questionEl.textContent = shuffledQuestions[index];
      answerEl.value = "";
      setTimeout(() => {
        answerEl.focus();
        scrollInputIntoView();
      }, 50);
    }

    function nextQuestion() {
      index += 1;
      if ((performance.now() - startTime) / 1000 >= TASK_DURATION_SEC) {
        finishTask();
      } else {
        showQuestion();
      }
    }

    function updateTime() {
      const elapsed = (performance.now() - startTime) / 1000;
      const remaining = Math.max(0, Math.ceil(TASK_DURATION_SEC - elapsed));
      timeEl.textContent = `残り ${remaining} 秒`;
      if (elapsed >= TASK_DURATION_SEC) finishTask();
    }

    function finishTask() {
      clearAllTimers();
      answerEl.blur();
      document.body.classList.remove("keyboard-open");
      taskEl.style.display = "none";
      countdownEl.style.display = "none";
      endEl.style.display = "block";
      bottomButtonsEl.style.display = "grid";
      timeEl.textContent = "終了";
    }

    function clearAllTimers() {
      clearInterval(countdownTimer);
      clearInterval(taskTimer);
    }

    function scrollInputIntoView() {
      setTimeout(() => {
        answerEl.scrollIntoView({ block: "center", behavior: "smooth" });
      }, 120);
    }

    function handleViewportChange() {
      if (!window.visualViewport) return;
      const keyboardLikelyOpen = window.visualViewport.height < window.innerHeight * 0.78;
      document.body.classList.toggle("keyboard-open", keyboardLikelyOpen);
      if (keyboardLikelyOpen) scrollInputIntoView();
    }

    async function fullscreen() {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
      } catch {}
    }

    document.getElementById("startBtn").addEventListener("click", showCountdown);
    document.getElementById("next").addEventListener("click", nextQuestion);
    answerEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") nextQuestion();
    });
    answerEl.addEventListener("focus", () => {
      document.body.classList.add("keyboard-open");
      scrollInputIntoView();
    });
    answerEl.addEventListener("blur", () => {
      setTimeout(() => document.body.classList.remove("keyboard-open"), 200);
    });
    document.getElementById("restart").addEventListener("click", showCountdown);
    document.getElementById("fullscreen").addEventListener("click", fullscreen);
    document.getElementById("fullscreenStart").addEventListener("click", fullscreen);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", handleViewportChange);
      window.visualViewport.addEventListener("scroll", handleViewportChange);
    }

    window.addEventListener("load", showStartScreen);
  </script>
</body>
</html>
